version: '3.8'
services:
  channels-dvr-manager:
    build: .
    image: channels-dvr-manager:latest
    ports:
      - "8081:80"
#    environment:
#      - API_PROXY_URL=https://your-backend-url.example.com
#      - VITE_UNSPLASH_CLIENT_ID=your_unsplash_client_id
    # Uncomment if you want to use a .env file for build args
    env_file:
      - .env
    restart: unless-stopped

