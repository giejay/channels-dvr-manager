version: '3.8'
services:
  channels-dvr-manager:
    build:
      context: .
      args:
        # Build-time variables (baked into the JS bundle)
        - VITE_STREAM_URL=${VITE_STREAM_URL}
        - VITE_UNSPLASH_CLIENT_ID=${VITE_UNSPLASH_CLIENT_ID}
    image: channels-dvr-manager:latest
    ports:
      - "8081:80"
    # environment:
    #   # Runtime variables (used by nginx)
    #   - API_PROXY_URL=${API_PROXY_URL}
    env_file:
      - .env
    restart: unless-stopped

